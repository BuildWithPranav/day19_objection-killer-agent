<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Call Audio Capture</title>
  <style>
    :root { color-scheme:dark; --bg:#05070b; --panel:#111827; --text:#f8fafc; --muted:#94a3b8; --line:#263244; --green:#22c55e; --red:#ef4444; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; font-family:Inter, ui-sans-serif, system-ui, sans-serif; background:radial-gradient(circle at top,#172554,#05070b 55%); color:var(--text); }
    .panel { width:min(720px,92vw); border:1px solid var(--line); background:rgba(17,24,39,.82); border-radius:28px; padding:30px; box-shadow:0 24px 80px rgba(0,0,0,.35); }
    h1 { margin:0 0 10px; font-size:30px; }
    p { color:var(--muted); line-height:1.55; }
    button { border:0; padding:14px 18px; border-radius:15px; color:white; background:#2563eb; font-weight:900; cursor:pointer; margin-right:10px; }
    button.stop { background:#b91c1c; }
    .status { margin-top:18px; padding:14px; border-radius:16px; background:#020617; border:1px solid var(--line); }
    .dot { display:inline-block; width:10px; height:10px; border-radius:50%; background:#64748b; margin-right:8px; }
    .dot.live { background:var(--green); box-shadow:0 0 18px var(--green); }
    code { background:#020617; padding:3px 6px; border-radius:6px; color:#93c5fd; }
  </style>
</head>
<body>
<div class="panel">
  <h1>Silent Shadow Capture</h1>
  <p>Open this page in a browser, click <strong>Start Capture</strong>, then select the Zoom/Google Meet/Teams tab and enable <strong>Share tab audio</strong>. The customer does not see this page.</p>
  <p>Session: <code>{{ session_id }}</code></p>
  <button id="start">Start Capture</button>
  <button id="stop" class="stop" disabled>Stop</button>
  <div class="status"><span id="dot" class="dot"></span><span id="status">idle</span></div>
</div>
<script>
  const sessionId = {{ session_id|tojson }};
  const token = {{ token|tojson }};
  const wsUrl = `${{{ ws_url|tojson }}}/ws/audio/${encodeURIComponent(sessionId)}?token=${encodeURIComponent(token)}`;
  let ws, recorder, stream;
  const dot = document.getElementById('dot');
  const statusEl = document.getElementById('status');

  function setStatus(text, live=false) { statusEl.textContent = text; dot.classList.toggle('live', live); }

  document.getElementById('start').onclick = async () => {
    try {
      setStatus('requesting tab audio');
      stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: { echoCancellation: false, noiseSuppression: false, sampleRate: 48000 } });
      const audioTracks = stream.getAudioTracks();
      if (!audioTracks.length) throw new Error('No tab/system audio track selected. Re-start and check Share tab audio.');

      ws = new WebSocket(wsUrl);
      ws.binaryType = 'arraybuffer';
      ws.onopen = () => {
        setStatus('streaming audio to STT', true);
        recorder = new MediaRecorder(new MediaStream(audioTracks), { mimeType: 'audio/webm;codecs=opus' });
        recorder.ondataavailable = async (event) => {
          if (event.data.size > 0 && ws.readyState === WebSocket.OPEN) ws.send(await event.data.arrayBuffer());
        };
        recorder.start(250);
        document.getElementById('start').disabled = true;
        document.getElementById('stop').disabled = false;
      };
      ws.onmessage = (ev) => { try { const msg = JSON.parse(ev.data); if (msg.type === 'error') setStatus(msg.message); } catch (_) {} };
      ws.onclose = () => setStatus('connection closed');
      ws.onerror = () => setStatus('websocket error');
    } catch (err) {
      setStatus(err.message || String(err));
    }
  };

  document.getElementById('stop').onclick = () => {
    if (recorder && recorder.state !== 'inactive') recorder.stop();
    if (ws && ws.readyState === WebSocket.OPEN) ws.send('stop');
    if (stream) stream.getTracks().forEach(t => t.stop());
    document.getElementById('start').disabled = false;
    document.getElementById('stop').disabled = true;
    setStatus('stopped');
  };
</script>
</body>
</html>
